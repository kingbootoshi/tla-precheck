name: nightly-verification

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: tla_precheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tla_precheck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tla_precheck
      TLA2TOOLS_VERSION: v1.8.0
      TLA2TOOLS_SHA256: a89d5ef05d1abddab6acfda1dbace14e2e45e7960527ac186dd19c170a955080
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - run: bun install
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - run: bun run generate:db

      - name: Apply generated storage contract
        run: |
          bun -e '
            const db = new Bun.SQL(process.env.DATABASE_URL);
            await db.unsafe(`
              DROP TABLE IF EXISTS public.agent_runs CASCADE;
              CREATE TABLE public.agent_runs (
                id BIGSERIAL PRIMARY KEY,
                owner TEXT,
                status TEXT NOT NULL
              );
            `);
            await db.close();
            const [{ default: machine }, { applyPostgresStorageContract }] = await Promise.all([
              import("./dist/examples/agentRuns.machine.js"),
              import("./dist/db/postgres.js")
            ]);
            await applyPostgresStorageContract(machine, process.env.DATABASE_URL);
          '

      - run: bun run verify:db
      - run: bun run test:db

      - name: Download TLC
        run: |
          mkdir -p .cache/tla
          curl -L https://github.com/tlaplus/tlaplus/releases/download/${TLA2TOOLS_VERSION}/tla2tools.jar -o .cache/tla/tla2tools.jar
          echo "${TLA2TOOLS_SHA256}  .cache/tla/tla2tools.jar" | shasum -a 256 -c -

      - name: Verify all machine tiers
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/.cache/tla/tla2tools.jar
        run: bun run verify:all:full

      - name: Run compiler fuzz nightly suite
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/.cache/tla/tla2tools.jar
        run: bun run test:fuzz:nightly

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-generated-machines
          path: .generated-machines/**
