name: machine-verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - run: bun install
      - run: bun run lint
      - run: bun run test
      - run: bun run build

      - name: Download TLC
        run: |
          mkdir -p .cache/tla
          test -f .cache/tla/tla2tools.jar || curl -L https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar -o .cache/tla/tla2tools.jar

      - name: Verify AgentRuns example
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/.cache/tla/tla2tools.jar
        run: bun run verify

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-machines
          path: .generated-machines/**
