name: machine-verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: tla_precheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tla_precheck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tla_precheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - run: bun install
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - run: bun run generate:db

      - name: Apply generated storage contract
        run: |
          bun -e '
            const db = new Bun.SQL(process.env.DATABASE_URL);
            await db.unsafe(`
              DROP TABLE IF EXISTS public.agent_runs CASCADE;
              CREATE TABLE public.agent_runs (
                id BIGSERIAL PRIMARY KEY,
                owner TEXT,
                status TEXT NOT NULL
              );
            `);
            await db.close();
            const [{ default: machine }, { applyPostgresStorageContract }] = await Promise.all([
              import("./dist/examples/agentRuns.machine.js"),
              import("./dist/db/postgres.js")
            ]);
            await applyPostgresStorageContract(machine, process.env.DATABASE_URL);
          '

      - run: bun run verify:db
      - run: bun run test:db

      - name: Download TLC
        run: |
          mkdir -p .cache/tla
          test -f .cache/tla/tla2tools.jar || curl -L https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar -o .cache/tla/tla2tools.jar

      - name: Verify AgentRuns example
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/.cache/tla/tla2tools.jar
        run: bun run verify

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-machines
          path: .generated-machines/**
